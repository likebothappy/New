<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - CodeMarket</title>
    <meta name="description" content="View detailed information about this premium source code solution.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <!-- Header aur baaki HTML pehle jaisa hi hai -->
    <header>
        <nav class="container">
            <a href="/" class="logo">Code<span>Market</span></a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/terms">Terms</a></li>
                <li><a href="/privacy">Privacy</a></li>
            </ul>
            <button class="hamburger" aria-label="Toggle Menu">
                <span class="line line-1"></span>
                <span class="line line-2"></span>
                <span class="line line-3"></span>
            </button>
        </nav>
        <div class="mobile-nav">
            <ul class="mobile-nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/terms">Terms</a></li>
                <li><a href="/privacy">Privacy</a></li>
            </ul>
        </div>
    </header>

    <main>
        <section id="loading-section" class="container">
            <div class="hero"><div class="spinner"></div><p style="margin-top: 1rem;">Loading product details...</p></div>
        </section>
        <section id="not-found-section" class="container hidden"><!-- ... --></section>
        <section id="product-section" class="container hidden">
             <div class="product-detail-layout">
                <div class="product-image-container card">
                    <img id="product-image" src="" alt="Product Image" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div class="product-info-container card">
                    <h1 id="product-title" class="product-detail-title"></h1>
                    <div id="product-price" class="product-detail-price"></div>
                    <div class="product-detail-section"><h3>Description</h3><p id="product-description" class="product-detail-description"></p></div>
                    <div class="product-detail-section"><h3>What You Get</h3><ul class="feature-list"><!-- ... --></ul></div>
                    <button id="buy-now-btn" class="btn btn-large"><!-- ... --></button>
                </div>
            </div>
            <div class="additional-info-grid"><!-- ... --></div>
        </section>
    </main>
    <footer><!-- ... --></footer>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- JavaScript -->
    <script type="module">
        const productDetailStyles = `/* ... saare styles ... */`;
        const styleSheet = document.createElement("style");
        styleSheet.innerText = productDetailStyles;
        document.head.appendChild(styleSheet);

        import { productService } from './js/firebase-config.js';

        // Hamburger Menu Logic
        const hamburger = document.querySelector('.hamburger');
        const mobileNav = document.querySelector('.mobile-nav');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileNav.classList.toggle('active');
        });

        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const loadingSection = document.getElementById('loading-section');
        const notFoundSection = document.getElementById('not-found-section');
        const productSection = document.getElementById('product-section');
        let currentProduct = null;

        async function loadProduct() {
            if (!productId) { showNotFound(); return; }
            try {
                const result = await productService.getProduct(productId);
                if (result.success) {
                    currentProduct = result.product;
                    displayProduct(currentProduct);
                } else {
                    showNotFound();
                }
            } catch (error) {
                showNotFound();
            }
        }

        function displayProduct(product) {
            // --- YAHAN BADLAV KIYA GAYA HAI ---
            // Yeh alert box aapko phone par product ka saara data dikhayega
            alert("Product Data: " + JSON.stringify(product, null, 2));
            // --- BADLAV KHATAM ---

            document.getElementById('product-title').textContent = product.title;
            document.getElementById('product-price').textContent = `₹${product.price.toLocaleString('en-IN')}`;
            document.getElementById('product-description').textContent = product.description;
            
            const productImage = document.getElementById('product-image');
            // Yeh code image ke URL ko dhoondhne ki koshish karega
            productImage.src = product.imageUrl || 'https://via.placeholder.com/600x400?text=Image+URL+Missing';
            
            loadingSection.classList.add('hidden');
            productSection.classList.remove('hidden');
        }

        function showNotFound() {
            loadingSection.classList.add('hidden');
            notFoundSection.classList.remove('hidden');
        }

        // Buy Now button ka logic yahan hai...
        document.getElementById('buy-now-btn').addEventListener('click', () => { /* ... */ });
        
        window.addEventListener('load', loadProduct);
    </script>
</body>
</html>
